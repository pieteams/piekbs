name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: |
          brew install onnxruntime
          brew install FiloSottile/musl-cross/musl-cross
          brew install create-dmg

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build darwin-arm64 + linux
        run: ./scripts/build.sh ${{ steps.version.outputs.VERSION }} darwin-arm64 linux-amd64 linux-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-arm64
          path: |
            dist/WikiLoop-${{ steps.version.outputs.VERSION }}-darwin-arm64.dmg
            dist/wikiloop-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz
            dist/wikiloop-${{ steps.version.outputs.VERSION }}-linux-arm64.tar.gz

  build-amd64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: |
          brew install onnxruntime
          brew install create-dmg

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build darwin-amd64
        run: ./scripts/build.sh ${{ steps.version.outputs.VERSION }} darwin-amd64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-amd64
          path: |
            dist/WikiLoop-${{ steps.version.outputs.VERSION }}-darwin-amd64.dmg

  release:
    needs: [build-arm64, build-amd64]
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-arm64
          path: dist/

      - name: Download amd64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-amd64
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WikiLoop v${{ steps.version.outputs.VERSION }}
          body: |
            ## Installation

            ### macOS Apple Silicon
            1. Download `WikiLoop-${{ steps.version.outputs.VERSION }}-darwin-arm64.dmg`
            2. Open the DMG and drag WikiLoop to Applications

            ### macOS Intel
            1. Download `WikiLoop-${{ steps.version.outputs.VERSION }}-darwin-amd64.dmg`
            2. Open the DMG and drag WikiLoop to Applications

            ### Linux (x86_64 / ARM64)
            ```bash
            tar -xzf wikiloop-${{ steps.version.outputs.VERSION }}-linux-<arch>.tar.gz
            sudo ln -sf $(pwd)/wikiloop /usr/local/bin/wikiloop
            ```

            ## Embedding Model
            Download separately and place in `<WIKILOOP_KB>/models/bge-small-zh/`:
            - `model.onnx`
            - `tokenizer.json`
            - `meta.json`

            See [README](https://github.com/jasen215/wikiloop#quick-start) for full setup instructions.
          files: |
            dist/WikiLoop-${{ steps.version.outputs.VERSION }}-darwin-arm64.dmg
            dist/WikiLoop-${{ steps.version.outputs.VERSION }}-darwin-amd64.dmg
            dist/wikiloop-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz
            dist/wikiloop-${{ steps.version.outputs.VERSION }}-linux-arm64.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
