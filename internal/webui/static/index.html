<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WikiLoop</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
    <a class="brand" href="/">WikiLoop</a>
    <a href="/" class="active" data-i18n="nav.home">Home</a>
    <a href="/files" data-i18n="nav.files">Files</a>
    <a href="/settings" data-i18n="nav.settings">Settings</a>
</nav>
<div class="container">
    <div class="card" id="status-card">
        <h2 data-i18n="status.title">Knowledge Base Status</h2>
        <div class="status-row" id="kind-grid" style="display:none">
            <div class="stat-item">
                <div class="stat-value" id="stat-docs">—</div>
                <div class="stat-label" data-i18n="status.documents">Documents</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-size">—</div>
                <div class="stat-label" data-i18n="status.index_size">Index Size</div>
            </div>
            <div class="stat-divider"></div>
            <div class="kind-item">
                <span class="kind-count" id="kind-raw">—</span>
                <span class="kind-label" data-i18n="status.raw">raw</span>
                <span class="kind-desc" data-i18n="status.raw_desc">原始资料</span>
            </div>
            <div class="kind-item">
                <span class="kind-count" id="kind-source-note">—</span>
                <span class="kind-label">source-note</span>
                <span class="kind-desc" data-i18n="status.source_note_desc">蒸馏摘要</span>
            </div>
            <div class="kind-item">
                <span class="kind-count" id="kind-concept">—</span>
                <span class="kind-label">concept</span>
                <span class="kind-desc" data-i18n="status.concept_desc">概念综合</span>
            </div>
            <div class="kind-item">
                <span class="kind-count" id="kind-comparison">—</span>
                <span class="kind-label">comparison</span>
                <span class="kind-desc" data-i18n="status.comparison_desc">方案对比</span>
            </div>
            <div class="kind-item">
                <span class="kind-count" id="kind-decision">—</span>
                <span class="kind-label">decision</span>
                <span class="kind-desc" data-i18n="status.decision_desc">技术决策</span>
            </div>
        </div>
        <p id="status-error" class="error" style="display:none"></p>
    </div>

    <div class="card admin-row">
        <button id="reindex-btn" onclick="doReindex(false)" data-i18n="status.reindex">Reindex</button>
        <button onclick="doReindex(true)" data-i18n="status.reindex_full">Full Reindex</button>
        <button onclick="doLint()" data-i18n="status.lint">Lint</button>
        <span id="admin-status" style="font-size:12px;color:#555;align-self:center"></span>
    </div>
    <div id="lint-results" style="margin-top:8px;font-size:12px;display:none"></div>
    <div id="red-links-panel" style="margin-top:12px;display:none">
      <div style="font-weight:600;margin-bottom:6px;font-size:13px">
        知识缺口 / Knowledge Gaps
        <span id="red-links-count" style="font-weight:400;color:#888;font-size:12px"></span>
      </div>
      <div id="red-links-list"></div>
    </div>

    <div class="card">
        <h2 data-i18n="search.title">Search</h2>
        <div class="search-row">
            <input type="text" id="search-input" data-i18n-placeholder="search.placeholder" placeholder="Search the knowledge base..." autofocus>
            <button onclick="doSearch()" data-i18n="search.btn">Search</button>
        </div>
        <ul class="results-list" id="results-list"></ul>
        <p id="search-error" class="error" style="display:none"></p>
    </div>
</div>


<script>
let dict = {};
function t(key) { return dict[key] || key; }

function fmtSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

function layerBadge(layer) {
    const cls = {wiki: 'badge-wiki', raw: 'badge-raw', schema: 'badge-schema'}[layer] || 'badge-raw';
    return `<span class="badge ${cls}">${layer}</span>`;
}

async function loadStatus() {
    try {
        const res = await fetch('/api/status');
        const data = await res.json();
        if (data.error) {
            document.getElementById('status-error').textContent = data.error;
            document.getElementById('status-error').style.display = '';
            return;
        }
        const byLayer = data.by_layer || {};
        const byKind  = data.by_kind  || {};
        document.getElementById('stat-docs').textContent        = data.documents ?? 0;
        document.getElementById('stat-size').textContent        = fmtSize(data.index_size ?? 0);
        document.getElementById('kind-raw').textContent         = byLayer['raw'] ?? 0;
        document.getElementById('kind-source-note').textContent = byKind['source-note'] ?? 0;
        document.getElementById('kind-concept').textContent     = byKind['concept'] ?? 0;
        document.getElementById('kind-comparison').textContent  = byKind['comparison'] ?? 0;
        document.getElementById('kind-decision').textContent    = byKind['decision'] ?? 0;
        document.getElementById('kind-grid').style.display = '';
    } catch(e) {
        document.getElementById('status-error').textContent = t('error.connect');
        document.getElementById('status-error').style.display = '';
    }
}

async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    const list = document.getElementById('results-list');
    const errEl = document.getElementById('search-error');
    errEl.style.display = 'none';
    list.innerHTML = '';
    if (!q) return;

    try {
        const res = await fetch('/api/search?q=' + encodeURIComponent(q));
        const data = await res.json();
        if (data.error) {
            errEl.textContent = data.error;
            errEl.style.display = '';
            return;
        }
        const results = data.results || [];
        if (results.length === 0) {
            list.innerHTML = `<li><span class="empty">${t('search.no_results')}</span></li>`;
            return;
        }
        results.forEach(r => {
            const li = document.createElement('li');
            li.innerHTML = `
                <div class="result-title">${escHtml(r.title || r.path)}</div>
                <div class="result-meta">${layerBadge(r.layer)} ${escHtml(r.path)}</div>
                ${r.snippet ? `<div class="result-snippet">${escHtml(r.snippet)}</div>` : ''}
            `;
            list.appendChild(li);
        });
    } catch(e) {
        errEl.textContent = t('error.search_failed');
        errEl.style.display = '';
    }
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
});

async function doReindex(full) {
    const status = document.getElementById('admin-status');
    status.textContent = full ? t('status.reindex_full') + '...' : t('status.reindex') + '...';
    try {
        const res = await fetch('/api/reindex?full=' + full, { method: 'POST' });
        const data = await res.json();
        if (data.error) { status.style.color = '#cf222e'; status.textContent = data.error; return; }
        status.style.color = '#1a7f37';
        status.textContent = '✓ ' + data.written + ' files indexed';
        loadStatus();
    } catch(e) {
        status.style.color = '#cf222e'; status.textContent = 'Failed';
    }
}

async function doLint() {
    const status = document.getElementById('admin-status');
    const lintEl = document.getElementById('lint-results');
    status.textContent = t('status.lint') + '...';
    lintEl.style.display = 'none';
    try {
        const res = await fetch('/api/lint');
        const data = await res.json();
        if (data.error) { status.style.color = '#cf222e'; status.textContent = data.error; return; }
        const count = data.count || 0;
        if (count === 0) {
            status.style.color = '#1a7f37'; status.textContent = '✓ No issues found';
        } else {
            status.style.color = '#cf222e'; status.textContent = count + ' issue(s) found';
            lintEl.style.display = '';
            lintEl.innerHTML = (data.warnings || []).map(w =>
                `<div style="color:#cf222e;margin:2px 0">⚠ ${escHtml(w.path)}: ${escHtml(w.kind)} — ${escHtml(w.detail)}</div>`
            ).join('');
        }
        loadRedLinks();
    } catch(e) {
        status.style.color = '#cf222e'; status.textContent = 'Failed';
    }
}

async function loadRedLinks() {
    const panel = document.getElementById('red-links-panel');
    const countEl = document.getElementById('red-links-count');
    const listEl = document.getElementById('red-links-list');
    try {
        const res = await fetch('/api/red-links');
        const data = await res.json();
        const links = data.red_links || [];
        if (links.length === 0) { panel.style.display = 'none'; return; }
        panel.style.display = '';
        countEl.textContent = '(' + links.length + ')';
        listEl.innerHTML = links.map(l =>
            `<div style="display:flex;align-items:center;gap:8px;margin:3px 0;font-size:12px">
              <span style="color:#cf222e">⬤</span>
              <span style="flex:1">${escHtml(l.concept)}</span>
              <span style="color:#888">引用 ${l.count} 次</span>
              <button onclick="deleteRedLink(${JSON.stringify(l.concept)})"
                style="padding:2px 8px;font-size:11px;border:1px solid #d0d7de;border-radius:4px;cursor:pointer;background:#fff">
                忽略
              </button>
            </div>`
        ).join('');
    } catch(e) { panel.style.display = 'none'; }
}

async function deleteRedLink(concept) {
    await fetch('/api/red-links?concept=' + encodeURIComponent(concept), {method:'DELETE'});
    loadRedLinks();
}

</script>

<script>
async function applyI18n() {
  let lang = "en";
  try {
    const res = await fetch("/api/settings");
    const cfg = await res.json();
    lang = cfg?.ui?.language || "en";
  } catch (_) {}

  dict = {};
  try {
    const res = await fetch("/static/i18n/" + lang + ".json");
    dict = await res.json();
  } catch (_) {
    // fallback: try en.json
    try {
      const res = await fetch("/static/i18n/en.json");
      dict = await res.json();
    } catch (_) {}
  }

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (!dict[key]) return;
    if (el.children.length > 0) {
      for (const node of el.childNodes) {
        if (node.nodeType === Node.TEXT_NODE) {
          node.textContent = dict[key];
          break;
        }
      }
    } else {
      el.textContent = dict[key];
    }
  });

  document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
    const key = el.getAttribute("data-i18n-placeholder");
    if (dict[key]) el.placeholder = dict[key];
  });

  loadStatus();
  loadRedLinks();
}

document.addEventListener("DOMContentLoaded", applyI18n);
</script>
</body>
</html>
