<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Pig head (circle) -->
  <circle cx="50" cy="55" r="38" fill="none" stroke="black" stroke-width="6"/>
  <!-- Left ear -->
  <ellipse cx="20" cy="26" rx="13" ry="10" fill="none" stroke="black" stroke-width="5" transform="rotate(-20 20 26)"/>
  <!-- Right ear -->
  <ellipse cx="80" cy="26" rx="13" ry="10" fill="none" stroke="black" stroke-width="5" transform="rotate(20 80 26)"/>
  <!-- Left eye -->
  <circle cx="37" cy="48" r="5" fill="black"/>
  <!-- Right eye -->
  <circle cx="63" cy="48" r="5" fill="black"/>
  <!-- Snout -->
  <ellipse cx="50" cy="66" rx="16" ry="11" fill="none" stroke="black" stroke-width="5"/>
  <!-- Left nostril -->
  <circle cx="43" cy="67" r="3.5" fill="black"/>
  <!-- Right nostril -->
  <circle cx="57" cy="67" r="3.5" fill="black"/>
</svg>
