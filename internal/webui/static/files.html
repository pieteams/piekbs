<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files — WikiLoop</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body > .container { max-width: 80%; }
    </style>
</head>
<body>
<nav>
    <a class="brand" href="/">WikiLoop</a>
    <a href="/" data-i18n="nav.home">Home</a>
    <a href="/files" class="active" data-i18n="nav.files">Files</a>
    <a href="/settings" data-i18n="nav.settings">Settings</a>
</nav>
<div class="container">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div class="card" style="margin:0">
            <h2 data-i18n="files.lark_title">Import Lark / Feishu Wiki</h2>
            <div style="display:flex;gap:8px">
                <input id="lark-url" type="url" placeholder="https://example.larkoffice.com/wiki/..." style="flex:1;padding:9px 12px;border:1px solid #d0d7de;border-radius:6px;font-size:14px">
                <button id="lark-import-btn" data-i18n="files.lark_import" style="padding:9px 18px;background:#0969da;color:#fff;border:0;border-radius:6px;cursor:pointer">Import</button>
            </div>
            <p data-i18n="files.lark_hint" style="font-size:12px;color:#6e7781;margin-bottom:0">Embedded Base tables are imported in full and become searchable. Requires a logged-in lark-cli user on this Mac.</p>
            <div id="lark-import-status" style="margin-top:10px;font-size:13px"></div>
        </div>
        <div class="card" style="margin:0">
            <h2 data-i18n="files.upload_title">Upload Files</h2>
            <div id="drop-zone" style="display:flex;align-items:center;gap:8px;border:2px dashed #ccc;border-radius:8px;padding:12px 16px;color:#888;cursor:pointer;margin-bottom:16px;transition:border-color .2s,background .2s">
                <span style="font-size:22px">📂</span>
                <span data-i18n="files.drop_hint">Drop files here, or <label for="file-input" style="color:#0969da;cursor:pointer;text-decoration:underline" data-i18n="files.browse">browse</label></span>
                <input id="file-input" type="file" multiple style="display:none">
            </div>
            <div id="upload-status" style="margin-bottom:12px;font-size:13px"></div>
        </div>
    </div>
    <div class="card">
        <h2><span data-i18n="files.raw_title">Raw Files</span> <span id="files-count" style="font-weight:400;color:#888;font-size:13px"></span></h2>
        <table class="files-table" id="files-table">
            <thead>
                <tr>
                    <th data-i18n="files.col_path">Path</th>
                    <th data-i18n="files.col_size" style="width:90px">Size</th>
                    <th data-i18n="files.col_modified" style="width:170px">Modified</th>
                </tr>
            </thead>
            <tbody id="files-body">
                <tr><td colspan="3" class="empty" data-i18n="files.loading">Loading...</td></tr>
            </tbody>
        </table>
        <div id="files-pagination" class="pagination" style="display:none">
            <button id="prev-btn" disabled>&laquo; Previous</button>
            <span id="page-info"></span>
            <button id="next-btn" disabled>Next &raquo;</button>
        </div>
        <p id="files-error" class="error" style="display:none"></p>
    </div>
</div>

<script>
const I18N = {
  en: {
    "nav.home":           "Home",
    "nav.files":          "Files",
    "nav.settings":       "Settings",
    "files.upload_title": "Upload Files",
    "files.drop_hint":    "Drop files here, or",
    "files.browse":       "browse",
    "files.raw_title":    "Raw Files",
    "files.col_path":     "Path",
    "files.col_size":     "Size",
    "files.col_modified": "Modified",
    "files.loading":      "Loading...",
    "files.no_files":     "No files",
    "files.uploading":    "Uploading",
    "files.uploaded":     "file(s) uploaded",
    "files.failed":       "failed",
    "files.lark_title":   "Import Lark / Feishu Wiki",
    "files.lark_import":  "Import",
    "files.lark_hint":    "Embedded Base tables are imported in full and become searchable. Requires a logged-in lark-cli user on this Mac.",
    "files.lark_url":     "Enter a Lark Wiki URL",
    "files.lark_running": "Importing document and embedded tables...",
    "files.lark_failed":  "Import failed",
    "error.load_files":   "Failed to load file list",
  },
  zh: {
    "nav.home":           "首页",
    "nav.files":          "文件",
    "nav.settings":       "设置",
    "files.upload_title": "上传文件",
    "files.drop_hint":    "拖放文件到这里，或",
    "files.browse":       "浏览",
    "files.raw_title":    "原始文件",
    "files.col_path":     "路径",
    "files.col_size":     "大小",
    "files.col_modified": "修改时间",
    "files.loading":      "加载中…",
    "files.no_files":     "暂无文件",
    "files.uploading":    "上传中",
    "files.uploaded":     "个文件已上传",
    "files.failed":       "个失败",
    "files.lark_title":   "导入飞书 / Lark Wiki",
    "files.lark_import":  "导入",
    "files.lark_hint":    "内嵌多维表格会完整导入并支持搜索，需要本机 lark-cli 已登录用户账号。",
    "files.lark_url":     "请输入飞书 Wiki 地址",
    "files.lark_running": "正在导入文档和内嵌表格…",
    "files.lark_failed":  "导入失败",
    "error.load_files":   "无法加载文件列表",
  }
};

let _lang = "zh";

function t(key) {
  return (I18N[_lang] || I18N["zh"])[key] || (I18N["en"][key] || key);
}
</script>

<script>
const PAGE_SIZE = 10;
let allFiles = [];
let currentPage = 1;

function fmtSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

function fmtTime(ts) {
    if (!ts) return '—';
    return new Date(ts * 1000).toLocaleString('en-US');
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderPage() {
    const tbody = document.getElementById('files-body');
    const totalPages = Math.ceil(allFiles.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;

    const start = (currentPage - 1) * PAGE_SIZE;
    const page = allFiles.slice(start, start + PAGE_SIZE);

    tbody.innerHTML = page.map(f => {
        const full = f.path || f.name;
        const chars = [...full];
        const display = chars.length > 60 ? chars.slice(0, 60).join('') + '…' : full;
        return `<tr>
            <td title="${escHtml(full)}">${escHtml(display)}</td>
            <td>${fmtSize(f.size)}</td>
            <td>${fmtTime(f.mod_time)}</td>
        </tr>`;
    }).join('');

    document.getElementById('page-info').textContent = `${currentPage} / ${totalPages}`;
    document.getElementById('prev-btn').disabled = currentPage <= 1;
    document.getElementById('next-btn').disabled = currentPage >= totalPages;
    document.getElementById('files-pagination').style.display = totalPages > 1 ? '' : 'none';
}

document.getElementById('prev-btn').addEventListener('click', () => { currentPage--; renderPage(); });
document.getElementById('next-btn').addEventListener('click', () => { currentPage++; renderPage(); });

async function loadFiles() {
    const tbody = document.getElementById('files-body');
    const errEl = document.getElementById('files-error');
    try {
        const res = await fetch('/api/files');
        const data = await res.json();
        if (data.error) {
            errEl.textContent = data.error;
            errEl.style.display = '';
            tbody.innerHTML = '';
            return;
        }
        allFiles = data.files || [];
        document.getElementById('files-count').textContent = `(${allFiles.length} files)`;
        if (allFiles.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="empty">' + t('files.no_files') + '</td></tr>';
            return;
        }
        renderPage();
    } catch(e) {
        errEl.textContent = t('error.load_files');
        errEl.style.display = '';
        tbody.innerHTML = '';
    }
}

// ── Lark import ──────────────────────────────────────────────────────────
document.getElementById('lark-import-btn').addEventListener('click', async () => {
    const input = document.getElementById('lark-url');
    const button = document.getElementById('lark-import-btn');
    const status = document.getElementById('lark-import-status');
    const url = input.value.trim();
    if (!url) {
        status.innerHTML = `<span style="color:#cf222e">${t('files.lark_url')}</span>`;
        return;
    }
    button.disabled = true;
    status.textContent = t('files.lark_running');
    try {
        const res = await fetch('/api/import-lark', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || t('files.lark_failed'));
        status.innerHTML = `<span style="color:#1a7f37">✓ Imported ${escHtml(data.document_path)} · ${data.unique_rows || 0} unique row(s), ${data.duplicates_removed || 0} duplicate(s) removed</span>`;
        input.value = '';
        loadFiles();
    } catch (e) {
        status.innerHTML = `<span style="color:#cf222e">${escHtml(e.message || t('files.lark_failed'))}</span>`;
    } finally {
        button.disabled = false;
    }
});

// ── Upload ────────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const uploadStatus = document.getElementById('upload-status');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#0969da'; dropZone.style.background = '#f0f6ff'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#ccc'; dropZone.style.background = ''; });
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.style.borderColor = '#ccc';
    dropZone.style.background = '';
    uploadFiles(Array.from(e.dataTransfer.files));
});
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) uploadFiles(Array.from(fileInput.files));
    fileInput.value = '';
});

async function uploadFiles(files) {
    if (files.length === 0) return;
    let ok = 0, fail = 0;
    uploadStatus.textContent = `${t('files.uploading')} (0/${files.length})...`;
    for (let i = 0; i < files.length; i++) {
        const fd = new FormData();
        fd.append('file', files[i]);
        try {
            const res = await fetch('/api/upload', { method: 'POST', body: fd });
            const data = await res.json();
            data.ok ? ok++ : fail++;
        } catch { fail++; }
        uploadStatus.textContent = `${t('files.uploading')} (${i+1}/${files.length})...`;
    }
    uploadStatus.innerHTML = ok > 0
        ? `<span style="color:#1a7f37">✓ ${ok} ${t('files.uploaded')}</span>` + (fail > 0 ? `, <span style="color:#cf222e">${fail} ${t('files.failed')}</span>` : '')
        : `<span style="color:#cf222e">${fail} ${t('files.failed')}</span>`;
    loadFiles();
}
</script>

<script>
async function applyI18n() {
  try {
    const res = await fetch("/api/settings");
    const cfg = await res.json();
    _lang = cfg?.ui?.language || "zh";
  } catch (_) {}
  const dict = I18N[_lang] || I18N["zh"];
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (!dict[key]) return;
    if (el.children.length > 0) {
      for (const node of el.childNodes) {
        if (node.nodeType === Node.TEXT_NODE) {
          node.textContent = dict[key];
          break;
        }
      }
    } else {
      el.textContent = dict[key];
    }
  });
  loadFiles();
}

document.addEventListener("DOMContentLoaded", applyI18n);
</script>
</body>
</html>
