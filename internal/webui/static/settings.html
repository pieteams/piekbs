<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — WikiLoop</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .form-row { display:grid; grid-template-columns:180px 1fr; gap:8px 16px; align-items:center; margin-bottom:12px; }
        .form-row label { font-size:13px; color:#555; text-align:right; }
        .form-row input, .form-row select { padding:6px 10px; border:1px solid #d0d7de; border-radius:6px; font-size:14px; width:100%; box-sizing:border-box; background:#fff; }
        .form-row input:focus, .form-row select:focus { outline:none; border-color:#0969da; box-shadow:0 0 0 2px #dbeafe; }
        .form-section { margin-bottom:24px; }
        .form-section h3 { font-size:14px; font-weight:600; color:#444; margin:0 0 12px; border-bottom:1px solid #eee; padding-bottom:6px; }
        .save-btn { padding:8px 20px; background:#0969da; color:#fff; border:none; border-radius:6px; font-size:14px; cursor:pointer; }
        .save-btn:hover { background:#0757ba; }
        .preset-btn { padding:6px 12px; background:#f6f8fa; color:#24292f; border:1px solid #d0d7de; border-radius:6px; font-size:13px; cursor:pointer; }
        .hint { grid-column:2; margin-top:-4px; font-size:12px; color:#6e7781; }
        #save-msg { margin-left:12px; font-size:13px; }
    </style>
</head>
<body>
<nav>
    <a class="brand" href="/">WikiLoop</a>
    <a href="/" data-i18n="nav.home">Home</a>
    <a href="/files" data-i18n="nav.files">Files</a>
    <a href="/settings" class="active" data-i18n="nav.settings">Settings</a>
</nav>
<div class="container">
    <div class="card">
        <h2 data-i18n="settings.title">Settings</h2>
        <form id="settings-form">
            <div class="form-section">
                <h3 data-i18n="settings.distill_section">Distill (LLM)</h3>
                <div class="form-row">
                    <label for="distill-api-type" data-i18n="settings.api_type">API Type</label>
                    <select id="distill-api-type">
                        <option value="openai">OpenAI compatible</option>
                        <option value="anthropic">Anthropic</option>
                    </select>
                </div>
                <div class="form-row">
                    <label for="distill-base-url" data-i18n="settings.api_base_url">API Base URL</label>
                    <input id="distill-base-url" type="text" placeholder="https://api.deepseek.com">
                    <div class="hint" data-i18n="settings.base_url_hint">Both provider roots and URLs ending in /v1 are accepted.</div>
                </div>
                <div class="form-row">
                    <label for="distill-token" data-i18n="settings.api_token">API Token</label>
                    <input id="distill-token" type="password" placeholder="sk-...">
                    <div id="token-hint" class="hint">Saved tokens are never returned to the browser. Leave blank to keep the existing token.</div>
                </div>
                <div class="form-row">
                    <label for="distill-model" data-i18n="settings.model">Model</label>
                    <input id="distill-model" type="text" placeholder="deepseek-chat">
                </div>
            </div>
            <div class="form-section">
                <h3 data-i18n="settings.language_section">Language</h3>
                <div class="form-row">
                    <label for="lang-select" data-i18n="settings.language">Language</label>
                    <select id="lang-select">
                        <option value="zh">中文</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <div class="form-row">
                    <label></label>
                    <p class="hint" style="margin:0;font-size:12px;color:#888" data-i18n="settings.language_hint">
                        Tray menu language takes effect after restart.
                    </p>
                </div>
            </div>
            <div style="display:flex;align-items:center">
                <button type="submit" class="save-btn" data-i18n="settings.save">Save</button>
                <span id="save-msg"></span>
            </div>
        </form>
        <p id="settings-error" class="error" style="display:none"></p>
    </div>
</div>

<script>
async function loadSettings() {
    const errEl = document.getElementById('settings-error');
    try {
        const res = await fetch('/api/settings');
        const data = await res.json();
        if (data.error) { errEl.textContent = data.error; errEl.style.display = ''; return; }
        document.getElementById('distill-base-url').value = data.distill?.base_url || '';
        document.getElementById('distill-model').value = data.distill?.model || '';
        document.getElementById('distill-api-type').value = data.distill?.api_type || 'openai';
        if (data.distill?.token_configured) {
            document.getElementById('distill-token').placeholder = 'Configured — leave blank to keep';
        }
        document.getElementById('lang-select').value = data.ui?.language || 'zh';
    } catch(e) {
        errEl.textContent = 'Failed to load settings'; errEl.style.display = '';
    }
}

document.getElementById('settings-form').addEventListener('submit', async e => {
    e.preventDefault();
    const msg = document.getElementById('save-msg');
    msg.textContent = 'Saving...'; msg.style.color = '#555';
    const token = document.getElementById('distill-token').value;
    const distill = {
        api_type: document.getElementById('distill-api-type').value,
        base_url: document.getElementById('distill-base-url').value,
        model: document.getElementById('distill-model').value,
    };
    if (token) distill.token = token;
    const payload = {
        distill,
        ui: { language: document.getElementById('lang-select').value },
    };
    try {
        const res = await fetch('/api/settings', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (data.ok) {
            msg.textContent = '✓ Saved'; msg.style.color = '#1a7f37';
            setTimeout(() => location.reload(), 500);
        } else {
            msg.textContent = 'Save failed: ' + (data.error || 'unknown error'); msg.style.color = '#cf222e';
        }
    } catch(e) {
        msg.textContent = 'Save failed'; msg.style.color = '#cf222e';
    }
});

loadSettings();
</script>

<script>
const I18N = {
  en: {
    "nav.home":                  "Home",
    "nav.files":                 "Files",
    "nav.settings":              "Settings",
    "settings.title":            "Settings",
    "settings.distill_section":  "Distill (LLM)",
    "settings.api_base_url":     "API Base URL",
    "settings.api_type":         "API Type",
    "settings.base_url_hint":    "Both provider roots and URLs ending in /v1 are accepted.",
    "settings.api_token":        "API Token",
    "settings.model":            "Model",
    "settings.language_section": "Language",
    "settings.language":         "Language",
    "settings.language_hint":    "Tray menu language takes effect after restart.",
    "settings.save":             "Save",
  },
  zh: {
    "nav.home":                  "首页",
    "nav.files":                 "文件",
    "nav.settings":              "设置",
    "settings.title":            "设置",
    "settings.distill_section":  "蒸馏（LLM）",
    "settings.api_base_url":     "API 地址",
    "settings.api_type":         "API 类型",
    "settings.base_url_hint":    "支持服务根地址，也支持以 /v1 结尾的地址。",
    "settings.api_token":        "API Token",
    "settings.model":            "模型",
    "settings.language_section": "语言",
    "settings.language":         "语言",
    "settings.language_hint":    "托盘菜单语言重启后生效。",
    "settings.save":             "保存",
  }
};

async function applyI18n() {
  let lang = "zh";
  try {
    const res = await fetch("/api/settings");
    const cfg = await res.json();
    lang = cfg?.ui?.language || "zh";
  } catch (_) {}
  const dict = I18N[lang] || I18N["zh"];
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (dict[key]) el.textContent = dict[key];
  });
}

document.addEventListener("DOMContentLoaded", applyI18n);
</script>
</body>
</html>
