<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WikiLoop</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
    <a class="brand" href="/">WikiLoop</a>
    <a href="/" class="active" data-i18n="nav.home">Home</a>
    <a href="/files" data-i18n="nav.files">Files</a>
    <a href="/settings" data-i18n="nav.settings">Settings</a>
</nav>
<div class="container">
    <div class="card" id="status-card">
        <h2 data-i18n="status.title">Knowledge Base Status</h2>
        <div class="status-row" id="kind-grid" style="display:none">
            <div class="stat-item">
                <div class="stat-value" id="stat-docs">—</div>
                <div class="stat-label" data-i18n="status.documents">Documents</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-size">—</div>
                <div class="stat-label" data-i18n="status.index_size">Index Size</div>
            </div>
            <div class="stat-divider"></div>
            <div class="kind-item">
                <span class="kind-count" id="kind-raw">—</span>
                <span class="kind-label" data-i18n="status.raw">raw</span>
                <span class="kind-desc" data-i18n="status.raw_desc">原始资料</span>
            </div>
            <div class="kind-item">
                <span class="kind-count" id="kind-source-note">—</span>
                <span class="kind-label">source-note</span>
                <span class="kind-desc" data-i18n="status.source_note_desc">蒸馏摘要</span>
            </div>
            <div class="kind-item">
                <span class="kind-count" id="kind-concept">—</span>
                <span class="kind-label">concept</span>
                <span class="kind-desc" data-i18n="status.concept_desc">概念综合</span>
            </div>
            <div class="kind-item">
                <span class="kind-count" id="kind-comparison">—</span>
                <span class="kind-label">comparison</span>
                <span class="kind-desc" data-i18n="status.comparison_desc">方案对比</span>
            </div>
            <div class="kind-item">
                <span class="kind-count" id="kind-decision">—</span>
                <span class="kind-label">decision</span>
                <span class="kind-desc" data-i18n="status.decision_desc">技术决策</span>
            </div>
        </div>
        <p id="status-error" class="error" style="display:none"></p>
    </div>

    <div class="card">
        <h2 data-i18n="search.title">Search</h2>
        <div class="search-row">
            <input type="text" id="search-input" data-i18n-placeholder="search.placeholder" placeholder="Search the knowledge base..." autofocus>
            <button onclick="doSearch()" data-i18n="search.btn">Search</button>
        </div>
        <ul class="results-list" id="results-list"></ul>
        <p id="search-error" class="error" style="display:none"></p>
    </div>
</div>

<script>
const I18N = {
  en: {
    "nav.home":              "Home",
    "nav.files":             "Files",
    "nav.settings":          "Settings",
    "status.title":          "Knowledge Base Status",
    "status.documents":      "Documents",
    "status.index_size":     "Index Size",
    "status.raw":            "raw",
    "status.raw_desc":       "Source materials",
    "status.source_note_desc": "Distilled notes",
    "status.concept_desc":   "Concept pages",
    "status.comparison_desc":"Comparison pages",
    "status.decision_desc":  "Decision pages",
    "search.title":          "Search",
    "search.placeholder":    "Search the knowledge base...",
    "search.btn":            "Search",
    "search.no_results":     "No results found",
    "error.connect":         "Cannot connect to server",
    "error.search_failed":   "Search request failed",
  },
  zh: {
    "nav.home":              "首页",
    "nav.files":             "文件",
    "nav.settings":          "设置",
    "status.title":          "知识库状态",
    "status.documents":      "文档总数",
    "status.index_size":     "索引大小",
    "status.raw":            "raw",
    "status.raw_desc":       "原始资料",
    "status.source_note_desc": "蒸馏摘要",
    "status.concept_desc":   "概念综合",
    "status.comparison_desc":"方案对比",
    "status.decision_desc":  "技术决策",
    "search.title":          "搜索",
    "search.placeholder":    "搜索知识库…",
    "search.btn":            "搜索",
    "search.no_results":     "无结果",
    "error.connect":         "无法连接服务器",
    "error.search_failed":   "搜索请求失败",
  }
};

let _lang = "zh";

function t(key) {
  return (I18N[_lang] || I18N["zh"])[key] || (I18N["en"][key] || key);
}
</script>

<script>
function fmtSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
}

function layerBadge(layer) {
    const cls = {wiki: 'badge-wiki', raw: 'badge-raw', schema: 'badge-schema'}[layer] || 'badge-raw';
    return `<span class="badge ${cls}">${layer}</span>`;
}

async function loadStatus() {
    try {
        const res = await fetch('/api/status');
        const data = await res.json();
        if (data.error) {
            document.getElementById('status-error').textContent = data.error;
            document.getElementById('status-error').style.display = '';
            return;
        }
        const byLayer = data.by_layer || {};
        const byKind  = data.by_kind  || {};
        document.getElementById('stat-docs').textContent        = data.documents ?? 0;
        document.getElementById('stat-size').textContent        = fmtSize(data.index_size ?? 0);
        document.getElementById('kind-raw').textContent         = byLayer['raw'] ?? 0;
        document.getElementById('kind-source-note').textContent = byKind['source-note'] ?? 0;
        document.getElementById('kind-concept').textContent     = byKind['concept'] ?? 0;
        document.getElementById('kind-comparison').textContent  = byKind['comparison'] ?? 0;
        document.getElementById('kind-decision').textContent    = byKind['decision'] ?? 0;
        document.getElementById('kind-grid').style.display = '';
    } catch(e) {
        document.getElementById('status-error').textContent = t('error.connect');
        document.getElementById('status-error').style.display = '';
    }
}

async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    const list = document.getElementById('results-list');
    const errEl = document.getElementById('search-error');
    errEl.style.display = 'none';
    list.innerHTML = '';
    if (!q) return;

    try {
        const res = await fetch('/api/search?q=' + encodeURIComponent(q));
        const data = await res.json();
        if (data.error) {
            errEl.textContent = data.error;
            errEl.style.display = '';
            return;
        }
        const results = data.results || [];
        if (results.length === 0) {
            list.innerHTML = `<li><span class="empty">${t('search.no_results')}</span></li>`;
            return;
        }
        results.forEach(r => {
            const li = document.createElement('li');
            li.innerHTML = `
                <div class="result-title">${escHtml(r.title || r.path)}</div>
                <div class="result-meta">${layerBadge(r.layer)} ${escHtml(r.path)}</div>
                ${r.snippet ? `<div class="result-snippet">${escHtml(r.snippet)}</div>` : ''}
            `;
            list.appendChild(li);
        });
    } catch(e) {
        errEl.textContent = t('error.search_failed');
        errEl.style.display = '';
    }
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
});

loadStatus();
</script>

<script>
async function applyI18n() {
  try {
    const res = await fetch("/api/settings");
    const cfg = await res.json();
    _lang = cfg?.ui?.language || "zh";
  } catch (_) {}
  const dict = I18N[_lang] || I18N["zh"];
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (dict[key]) el.textContent = dict[key];
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
    const key = el.getAttribute("data-i18n-placeholder");
    if (dict[key]) el.placeholder = dict[key];
  });
}

document.addEventListener("DOMContentLoaded", applyI18n);
</script>
</body>
</html>
